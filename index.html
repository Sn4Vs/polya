<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Не грусти, Звёздочка</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0410;
    font-family: 'Georgia', 'Times New Roman', serif;
    -webkit-tap-highlight-color: transparent;
  }

  /* Глубокий романтический фон с мягким свечением */
  .scene {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 50% 35%, rgba(120, 20, 60, 0.55) 0%, rgba(40, 8, 30, 0.4) 35%, transparent 70%),
      radial-gradient(circle at 20% 80%, rgba(80, 10, 50, 0.4) 0%, transparent 55%),
      radial-gradient(circle at 80% 20%, rgba(60, 15, 70, 0.35) 0%, transparent 55%),
      linear-gradient(160deg, #14081a 0%, #1c0a1e 50%, #0a0410 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    overflow: hidden;
  }

  /* === Пока не нажали "начать" — все анимации сцены на паузе === */
  .scene:not(.started) * {
    animation-play-state: paused !important;
  }

  /* Пульсация фонового свечения */
  .glow-pulse {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 45%, rgba(255, 80, 130, 0.18) 0%, transparent 55%);
    animation: breathe 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.08); }
  }

  /* Сердце на весь экран (SVG) */
  .heart-svg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 115vmin;
    height: 115vmin;
    max-width: 760px;
    max-height: 760px;
    opacity: 0;
    pointer-events: none;
    filter: drop-shadow(0 0 30px rgba(255, 60, 110, 0.6));
  }

  .heart-path {
    fill: rgba(255, 45, 95, 0);
    stroke: #ff5e8a;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 1200;
    stroke-dashoffset: 1200;
  }

  /* Появление и обводка сердца */
  .draw .heart-svg { animation: heartReveal 0.6s ease-out forwards; }
  .draw .heart-path { animation: drawStroke 2.6s ease-in-out forwards, fillHeart 2s ease-in 2.2s forwards; }

  @keyframes heartReveal {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes drawStroke {
    to { stroke-dashoffset: 0; }
  }
  @keyframes fillHeart {
    from { fill: rgba(255, 45, 95, 0); }
    to   { fill: rgba(255, 45, 95, 0.32); }
  }

  /* Биение сердца после прорисовки */
  .beat .heart-svg { animation: heartbeat 1.6s ease-in-out infinite; }
  @keyframes heartbeat {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    15% { transform: translate(-50%, -50%) scale(1.06); }
    30% { transform: translate(-50%, -50%) scale(1); }
    45% { transform: translate(-50%, -50%) scale(1.04); }
    60% { transform: translate(-50%, -50%) scale(1); }
  }

  /* Текст */
  .text-wrap {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 0 24px;
  }

  .line1 {
    font-size: clamp(28px, 9vw, 56px);
    font-weight: 400;
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 0 0 24px rgba(255, 120, 160, 0.7), 0 2px 12px rgba(0,0,0,0.5);
    margin-bottom: 14px;
    display: inline-block;
  }

  /* Каждая буква появляется отдельно */
  .char {
    display: inline-block;
    opacity: 0;
    transform: translateY(28px) scale(0.6) rotate(-8deg);
    filter: blur(6px);
    animation: charIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .char.space { width: 0.32em; }
  @keyframes charIn {
    to { opacity: 1; transform: translateY(0) scale(1) rotate(0); filter: blur(0); }
  }

  .star {
    color: #ffd86b;
    text-shadow: 0 0 22px rgba(255, 200, 80, 0.9);
    animation: charIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards, twinkle 2.2s ease-in-out 1.2s infinite;
  }
  @keyframes twinkle {
    0%, 100% { text-shadow: 0 0 22px rgba(255, 200, 80, 0.9); }
    50% { text-shadow: 0 0 38px rgba(255, 220, 120, 1), 0 0 60px rgba(255,180,80,0.6); }
  }

  .subheart {
    font-size: clamp(34px, 11vw, 64px);
    opacity: 0;
    transform: scale(0);
    animation: heartPop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 2.4s forwards, pulseHeart 1.4s ease-in-out 3.3s infinite;
    display: inline-block;
  }
  @keyframes heartPop {
    0% { opacity: 0; transform: scale(0) rotate(-30deg); }
    70% { transform: scale(1.25) rotate(8deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  @keyframes pulseHeart {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* Парящие сердечки и искры */
  .particle {
    position: absolute;
    bottom: -40px;
    color: #ff6f9d;
    pointer-events: none;
    opacity: 0;
    animation: floatUp linear infinite;
    z-index: 2;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.5) rotate(0); }
    10% { opacity: 0.9; }
    90% { opacity: 0.7; }
    100% { opacity: 0; transform: translateY(-110vh) scale(1.1) rotate(40deg); }
  }

  .sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 8px 2px rgba(255, 220, 240, 0.9);
    opacity: 0;
    animation: sparkleTwinkle ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes sparkleTwinkle {
    0%, 100% { opacity: 0; transform: scale(0.4); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ============== ЛЕТАЮЩИЕ ПОЛАРОИДЫ С ПОДПИСЯМИ ============== */
  .photo-frame {
    position: absolute;
    bottom: -320px;
    z-index: 2;                 /* над фоном, под текстом (5) и кнопками (20) */
    padding: 11px 11px 0;       /* классические поля полароида, снизу — подпись */
    background: linear-gradient(160deg, #fffdfb, #fff2f6);
    border-radius: 4px;
    box-shadow: 0 16px 38px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,190,208,0.4),
                inset 0 0 0 1px rgba(255,255,255,0.7);
    opacity: 0;
    pointer-events: none;
    will-change: transform, opacity;
    animation: frameFloat linear infinite;
  }
  @keyframes frameFloat {
    0%   { opacity: 0; transform: translateY(0) rotate(var(--r, -5deg)); }
    9%   { opacity: var(--o, 0.9); }
    91%  { opacity: var(--o, 0.9); }
    100% { opacity: 0; transform: translateY(-145vh) rotate(calc(var(--r, -5deg) * -1)); }
  }

  /* Кусочек «скотча»/washi сверху — цвет и наклон разные у каждой */
  .pf-tape {
    position: absolute;
    top: -10px;
    left: 50%;
    width: 58px;
    height: 22px;
    transform: translateX(-50%) rotate(var(--tr, -4deg));
    background: var(--tape, rgba(255,214,120,0.6));
    border-radius: 2px;
    box-shadow: 0 3px 7px rgba(0,0,0,0.18);
    opacity: 0.85;
  }
  .pf-tape::after {   /* лёгкие полоски, как на washi-ленте */
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.25) 0 4px, transparent 4px 9px);
    border-radius: 2px;
  }

  /* Кадр (фото или заглушка) */
  .pf-inner {
    overflow: hidden;
    border-radius: 3px;
    background: #f5e8ef;
  }
  .pf-inner img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Пустой кадр — мягкий фон с иконкой */
  .pf-empty-photo {
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(150deg, #ffe9f1, #ffd7e6);
    color: rgba(190, 70, 120, 0.5);
    font-size: 34px;
    text-shadow: 0 2px 6px rgba(255,150,185,0.4);
  }

  /* Подпись «от руки» под кадром */
  .pf-cap {
    font-family: 'Segoe Script', 'Bradley Hand', 'Snell Roundhand', 'Comic Sans MS', 'Georgia', cursive;
    text-align: center;
    padding: 9px 6px 12px;
    font-size: 15px;
    line-height: 1.35;
    color: var(--cap, #8a2f52);
    letter-spacing: 0.2px;
  }
  .pf-cap.empty { font-size: 13px; color: #b0466b; }

  /* Фото-полароид кликабелен (пустые — нет) */
  .photo-frame.mem { pointer-events: auto; cursor: pointer; }

  /* Окно раскрытого воспоминания */
  .mem-view {
    position: fixed; inset: 0; z-index: 45;   /* выше кнопок(20), ниже старт-оверлея(50) и игры(60) */
    display: none; align-items: center; justify-content: center;
    padding: 26px; background: rgba(10,4,16,0.82);
    -webkit-backdrop-filter: blur(5px); backdrop-filter: blur(5px);
    cursor: pointer;
  }
  .mem-view.show { display: flex; animation: gFade 0.35s ease; }
  .mem-card {
    max-width: 330px; width: 100%;
    background: linear-gradient(160deg, #fffdfb, #fff2f6);
    border-radius: 6px; padding: 16px 16px 0;
    box-shadow: 0 26px 64px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.7);
    animation: memPop 0.55s cubic-bezier(0.2, 0.9, 0.3, 1.25);
  }
  @keyframes memPop {
    0%   { opacity: 0; transform: scale(0.35) rotate(-6deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  .mem-photo {
    width: 100%; aspect-ratio: 4 / 5; overflow: hidden; border-radius: 3px; background: #f5e8ef;
  }
  .mem-photo img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .mem-story {
    font-family: 'Segoe Script', 'Bradley Hand', 'Snell Roundhand', 'Comic Sans MS', 'Georgia', cursive;
    text-align: center; padding: 16px 8px 6px; font-size: 18px; line-height: 1.5; color: #8a2f52;
  }
  .mem-hint { text-align: center; color: #c79bb2; font-size: 12px; padding: 8px 0 14px; }

  /* Искры при раскрытии + каретка печати */
  .mem-spark {
    position: absolute; width: 5px; height: 5px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 8px 2px rgba(255,220,240,0.9);
    opacity: 0; pointer-events: none; z-index: 1;
    animation: memSpark 1.7s ease-in-out forwards;
  }
  @keyframes memSpark {
    0%   { opacity: 0; transform: scale(0.3); }
    40%  { opacity: 1; transform: scale(1.2); }
    100% { opacity: 0; transform: scale(0.5) translateY(-18px); }
  }
  .mem-story .caret {
    display: inline-block; width: 2px; height: 1em; margin-left: 1px;
    background: #b0466b; vertical-align: -2px; animation: memCaret 0.8s step-end infinite;
  }
  @keyframes memCaret { 50% { opacity: 0; } }

  /* === Экран запуска (нужен, чтобы браузер разрешил звук) === */
  .start-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 26px;
    background:
      radial-gradient(circle at 50% 45%, rgba(120, 20, 60, 0.5) 0%, transparent 60%),
      linear-gradient(160deg, #14081a 0%, #0a0410 100%);
    cursor: pointer;
    transition: opacity 0.8s ease;
  }
  .start-overlay.hide {
    opacity: 0;
    pointer-events: none;
  }
  .start-heart {
    font-size: clamp(60px, 18vw, 110px);
    animation: pulseHeart 1.4s ease-in-out infinite;
    filter: drop-shadow(0 0 24px rgba(255, 80, 130, 0.7));
  }
  .start-text {
    color: #ffd0e0;
    font-size: clamp(18px, 5vw, 26px);
    letter-spacing: 1px;
    text-shadow: 0 0 18px rgba(255, 120, 160, 0.6);
    animation: hintFade 2s ease-in-out infinite;
  }
  @keyframes hintFade {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }

  /* ====================== НИЖНИЕ КНОПКИ ====================== */
  .bottom-actions {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(env(safe-area-inset-bottom) + 26px);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: max-content;
    max-width: 92vw;
  }

  /* Счётчик-сердечки «соскучилась» */
  .miss-tally {
    opacity: 0;
    transition: opacity 0.5s ease;
    text-align: center;
    max-width: 88vw;
  }
  .miss-tally.show { opacity: 1; }
  .mt-hearts {
    display: block;
    font-size: 16px;
    line-height: 1.55;
    letter-spacing: 2px;
    word-break: break-word;
    filter: drop-shadow(0 0 6px rgba(255, 90, 130, 0.5));
  }
  .mt-num {
    display: block;
    margin-top: 3px;
    font-size: 13px;
    color: #e8b8cd;
    letter-spacing: 0.4px;
  }

  /* Кнопка-приглашение к игре */
  .play-btn {
    font-family: 'Georgia', serif;
    font-size: clamp(16px, 4.6vw, 20px);
    letter-spacing: 1px;
    color: #1a0610;
    background: linear-gradient(160deg, #ffd86b, #ff7ea5);
    border: 0;
    border-radius: 999px;
    padding: 14px 30px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(255, 90, 130, 0.45), inset 0 0 0 1px rgba(255,255,255,0.2);
    opacity: 0;
    pointer-events: none;
    transform: translateY(12px);
    transition: opacity 0.9s ease, transform 0.3s ease;
  }
  .play-btn.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
    animation: gBtnPulse 2.2s ease-in-out 1s infinite;
  }
  .play-btn:active { transform: scale(0.97); }
  @keyframes gBtnPulse {
    0%, 100% { box-shadow: 0 10px 30px rgba(255, 90, 130, 0.45); }
    50% { box-shadow: 0 10px 42px rgba(255, 150, 180, 0.85); }
  }

  /* Кнопка «соскучилась» — открывает набор номера */
  .miss-btn {
    text-decoration: none;
    font-family: 'Georgia', serif;
    font-size: clamp(16px, 4.6vw, 20px);
    letter-spacing: 1px;
    color: #fff3f8;
    background: linear-gradient(160deg, rgba(255,90,130,0.96), rgba(190,35,85,0.96));
    border: 1px solid rgba(255,180,200,0.4);
    border-radius: 999px;
    padding: 14px 30px;
    display: inline-flex;
    align-items: center;
    gap: 9px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(255, 60, 110, 0.45), inset 0 0 0 1px rgba(255,255,255,0.15);
    opacity: 0;
    pointer-events: none;
    transform: translateY(12px);
    transition: opacity 0.9s ease, transform 0.3s ease;
  }
  .miss-btn.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  .miss-btn:active { transform: scale(0.96); }
  .miss-emoji { display: inline-block; animation: pulseHeart 1.4s ease-in-out infinite; }

  /* Сердечко, вылетающее при нажатии «соскучилась» */
  .miss-float {
    position: fixed;
    z-index: 95;
    pointer-events: none;
    font-size: 24px;
    transform: translate(-50%, -50%);
    animation: missFloat 1.4s ease-out forwards;
  }
  @keyframes missFloat {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
    100% { opacity: 0; transform: translate(-50%, -180px) scale(1.4); }
  }

  /* ====================== МИНИ-ИГРА «СОБЕРИ ПАРЫ» ====================== */
  .game-screen {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: none;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 20px);
    background:
      radial-gradient(circle at 50% 30%, rgba(120, 20, 60, 0.5) 0%, transparent 60%),
      linear-gradient(160deg, #14081a 0%, #1c0a1e 55%, #0a0410 100%);
    color: #fff3f8;
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  .game-screen.show { display: flex; animation: gFade 0.6s ease; }

  .game-sky { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
  .game-sky span {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: #fff; opacity: 0.5; animation: gTwinkle 3.5s ease-in-out infinite;
  }
  @keyframes gTwinkle { 0%, 100% { opacity: 0.12; } 50% { opacity: 0.8; } }

  .g-top {
    position: relative; z-index: 2; width: 100%; max-width: 380px;
    display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
  }
  .g-icon {
    background: rgba(255,255,255,0.08); color: #ffd0e0;
    border: 1px solid rgba(255,160,190,0.25); border-radius: 999px;
    font-family: 'Georgia', serif; font-size: 14px; padding: 8px 15px; cursor: pointer;
  }
  .g-icon:active { transform: scale(0.96); }

  .g-head { position: relative; z-index: 2; text-align: center; margin: 18px 0 10px; }
  .g-head h1 {
    font-size: clamp(26px, 7.5vw, 38px); font-weight: 400; font-style: italic;
    margin: 0; color: #fff; text-shadow: 0 0 22px rgba(255,120,160,0.5);
  }
  .g-sub { margin: 7px 0 0; color: #e8b8cd; font-size: 14px; }

  .g-progress { position: relative; z-index: 2; display: flex; gap: 7px; margin: 12px 0 2px; }
  .g-progress i {
    width: 11px; height: 11px; border-radius: 50%;
    background: rgba(255,255,255,0.13); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
    transition: all 0.45s ease;
  }
  .g-progress i.on {
    background: radial-gradient(circle at 35% 30%, #fff, #ffd86b);
    box-shadow: 0 0 12px #ffd86b;
  }

  .g-board {
    position: relative; z-index: 2; display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; width: 100%; max-width: 380px; margin: 14px auto 0;
  }
  .g-hint {
    position: relative; z-index: 2; text-align: center;
    margin: 14px 0 0; font-size: 12.5px; font-style: italic;
    color: #c79bb2; letter-spacing: 0.3px;
    animation: hintFade 2.6s ease-in-out infinite;
  }
  .g-card { aspect-ratio: 3 / 4; perspective: 800px; background: none; border: 0; padding: 0; cursor: pointer; }
  .g-card-inner {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.5s cubic-bezier(0.4,0.2,0.2,1); transform-style: preserve-3d;
  }
  .g-card.flipped .g-card-inner { transform: rotateY(180deg); }
  .g-face {
    position: absolute; inset: 0; border-radius: 18px; backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center; font-size: clamp(28px, 9vw, 40px);
  }
  .g-back {
    background: linear-gradient(155deg, #451531, #260a1d);
    border: 1px solid rgba(255,140,175,0.22);
    box-shadow: 0 8px 22px rgba(0,0,0,0.4), inset 0 0 22px rgba(150,40,90,0.35);
    color: #ffb3c8;
  }
  .g-back::after { content: "✦"; text-shadow: 0 0 12px rgba(255,216,107,0.6); }
  .g-front {
    transform: rotateY(180deg);
    background: linear-gradient(155deg, #ffd9e6, #ffeef4);
    box-shadow: 0 8px 22px rgba(0,0,0,0.35);
  }
  .g-card.matched .g-front {
    box-shadow: 0 0 0 2px #ffd86b, 0 0 26px rgba(255,216,107,0.7);
    animation: gPop 0.5s ease;
  }
  @keyframes gPop {
    0% { transform: rotateY(180deg) scale(1); }
    40% { transform: rotateY(180deg) scale(1.08); }
    100% { transform: rotateY(180deg) scale(1); }
  }
  .g-card:focus-visible { outline: 3px solid #ffd86b; outline-offset: 3px; border-radius: 18px; }

  /* Записка при найденной паре */
  .g-note {
    position: fixed; inset: 0; z-index: 70; display: none;
    align-items: center; justify-content: center; padding: 26px;
    background: rgba(10,4,16,0.74); backdrop-filter: blur(4px);
  }
  .g-note.show { display: flex; animation: gFade 0.3s ease; }
  .g-note-card {
    max-width: 340px; width: 100%; text-align: center;
    background: linear-gradient(160deg, #2c0e22, #180712);
    border: 1px solid rgba(255,140,175,0.28); border-radius: 24px;
    padding: 30px 26px; box-shadow: 0 18px 50px rgba(0,0,0,0.55);
    animation: gRise 0.4s cubic-bezier(0.2,0.8,0.3,1);
  }
  .g-note-sym { font-size: 46px; margin-bottom: 10px; }
  .g-note-text { font-style: italic; font-size: 24px; line-height: 1.35; color: #fff; margin: 0; }
  .g-note-hint { margin: 18px 0 0; font-size: 12px; color: #c79bb2; }

  /* Финал */
  .g-win {
    position: fixed; inset: 0; z-index: 80; display: none;
    align-items: center; justify-content: center; padding: 26px;
    background: radial-gradient(120% 90% at 50% 0%, rgba(120,20,60,0.96), rgba(8,3,14,0.97));
  }
  .g-win.show { display: flex; animation: gFade 0.5s ease; }
  .g-win-card { max-width: 360px; text-align: center; position: relative; z-index: 2; }
  .g-win-card h2 {
    font-style: italic; font-weight: 400; font-size: clamp(28px, 8.5vw, 42px);
    margin: 0 0 14px; color: #fff; text-shadow: 0 0 26px rgba(255,120,160,0.5);
  }
  .g-win-card p { font-size: 17px; line-height: 1.5; color: #ffc2d6; margin: 0 0 26px; }
  .g-btn {
    font-family: 'Georgia', serif; font-size: 15px; color: #1a0610;
    background: linear-gradient(160deg, #ffd86b, #ff7ea5); border: 0; border-radius: 999px;
    padding: 14px 28px; cursor: pointer; box-shadow: 0 10px 26px rgba(255,126,165,0.45);
  }
  .g-btn:active { transform: scale(0.97); }

  /* Кнопка «узнать мечту» и текст мечты */
  .g-btn.dream {
    display: block; margin: 0 auto 16px;
    background: linear-gradient(160deg, #ff9ec0, #ff5e8a); color: #2a0714;
    box-shadow: 0 10px 26px rgba(255,94,138,0.55);
    animation: gBtnGlow 2s ease-in-out infinite;
  }
  @keyframes gBtnGlow {
    0%,100% { box-shadow: 0 10px 26px rgba(255,94,138,0.5); }
    50%     { box-shadow: 0 10px 40px rgba(255,150,185,0.9); }
  }
  .g-dream {
    display: none;
    font-style: italic; font-size: 20px; line-height: 1.5;
    color: #fff; margin: 0 0 22px;
    text-shadow: 0 0 22px rgba(255,150,185,0.7);
  }
  .g-dream.show { display: block; animation: gRise 0.6s ease; }

  .g-heart { position: fixed; bottom: -40px; z-index: 90; pointer-events: none; animation: gFloat linear forwards; }
  @keyframes gFloat { to { transform: translateY(-112vh) rotate(40deg); opacity: 0; } }
  @keyframes gFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes gRise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) {
    .game-screen * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
    .g-card-inner { transition: transform 0.2s ease; }
  }
</style>
</head>
<body>
  <!-- ФОНОВАЯ МУЗЫКА: положите файл music.mp3 рядом с index.html -->
  <audio id="bgm" src="music.mp3" loop preload="auto"></audio>

  <!-- Экран запуска -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-heart">❤️</div>
    <div class="start-text">нажмите, чтобы начать</div>
    <div class="start-text" id="dbg" style="font-size:13px;opacity:0.7;max-width:80%;"></div>
  </div>

  <div class="scene" id="scene">
    <div class="glow-pulse"></div>

    <!-- Сердце на весь экран -->
    <svg class="heart-svg" viewBox="0 0 200 185" preserveAspectRatio="xMidYMid meet">
      <path class="heart-path" d="M100 170
        C 100 170, 20 120, 20 65
        C 20 35, 42 18, 65 18
        C 85 18, 100 38, 100 38
        C 100 38, 115 18, 135 18
        C 158 18, 180 35, 180 65
        C 180 120, 100 170, 100 170 Z"/>
    </svg>

    <!-- Текст -->
    <div class="text-wrap">
      <div class="line1" id="line1"></div>
      <div class="subheart">❤️</div>
    </div>
  </div>

  <!-- Нижние кнопки: «поиграть» и «соскучилась» + счётчик -->
  <div class="bottom-actions">
    <div class="miss-tally" id="missTally" aria-live="polite"></div>
    <button class="play-btn" id="playBtn" aria-label="Поиграть">поиграть ✦</button>
    <a class="miss-btn" id="missBtn" href="tel:89042360018" aria-label="Соскучилась — позвонить">
      соскучилась <span class="miss-emoji">❤️</span>
    </a>
  </div>

  <!-- Раскрытое воспоминание (тап по летающему фото) -->
  <div class="mem-view" id="memView">
    <div class="mem-card">
      <div class="mem-photo"><img id="memImg" src="" alt=""></div>
      <p class="mem-story" id="memStory"></p>
      <p class="mem-hint">нажми, чтобы закрыть</p>
    </div>
  </div>

  <!-- Экран мини-игры -->
  <div class="game-screen" id="game">
    <div class="game-sky" id="gsky" aria-hidden="true"></div>

    <div class="g-top">
      <button class="g-icon" id="gBack" aria-label="Назад">‹ назад</button>
      <button class="g-icon" id="gMute" aria-label="Звук">♪ музыка</button>
    </div>

    <div class="g-head">
      <h1>Собери пары, Звёздочка</h1>
      <p class="g-sub">за каждой парой — словечко для тебя ✦</p>
    </div>

    <div class="g-progress" id="gprogress" aria-label="Найдено пар"></div>
    <div class="g-board" id="gboard"></div>
    <p class="g-hint">пройди аккуратно — в конце спрятан секрет ✦</p>

    <!-- Записка пары -->
    <div class="g-note" id="gnote">
      <div class="g-note-card">
        <div class="g-note-sym" id="gnoteSym">✦</div>
        <p class="g-note-text" id="gnoteText"></p>
        <p class="g-note-hint">нажми, чтобы продолжить</p>
      </div>
    </div>

    <!-- Финал -->
    <div class="g-win" id="gwin">
      <div class="g-win-card">
        <h2>Все звёздочки зажглись ✦</h2>
        <p id="gwinText"></p>
        <button class="g-btn dream" id="gDream" style="display:none">узнать мечту ✦</button>
        <p class="g-dream" id="gDreamText"></p>
        <button class="g-btn" id="gAgain">Сыграть ещё раз</button>
      </div>
    </div>
  </div>

<script>
  // Текст: "не грусти, Звёздочка"
  const line1 = document.getElementById('line1');
  const text = "не грусти, Звёздочка";
  let delay = 0.3;

  for (const ch of text) {
    if (ch === ' ') {
      const sp = document.createElement('span');
      sp.className = 'char space';
      sp.innerHTML = '&nbsp;';
      line1.appendChild(sp);
    } else {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = ch;
      span.style.animationDelay = delay.toFixed(2) + 's';
      line1.appendChild(span);
      delay += 0.07;
    }
  }

  // Маленькая золотая звёздочка после имени
  const star = document.createElement('span');
  star.className = 'char star';
  star.textContent = ' ✦';
  star.style.animationDelay = (delay + 0.1).toFixed(2) + 's';
  line1.appendChild(star);

  const scene = document.getElementById('scene');
  const textDone = (delay + 1.4) * 1000;

  // Декоративные искры и сердечки создаём заранее (они на паузе до старта)
  function spawnParticles() {
    const symbols = ['❤', '♥', '💕', '✦', '❤'];
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (12 + Math.random() * 26) + 'px';
      const dur = 6 + Math.random() * 7;
      p.style.animationDuration = dur + 's';
      p.style.animationDelay = (Math.random() * dur) + 's';
      const hues = ['#ff6f9d', '#ff9ec0', '#ffd86b', '#ff4f7e'];
      p.style.color = hues[Math.floor(Math.random() * hues.length)];
      scene.appendChild(p);
    }
  }
  function spawnSparkles() {
    for (let i = 0; i < 35; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = Math.random() * 100 + 'vh';
      s.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
      s.style.animationDelay = (Math.random() * 3) + 's';
      scene.appendChild(s);
    }
  }
  /* ================= ЛЕТАЮЩИЕ ФОТОРАМКИ =================
     PHOTOS  — список файлов фотографий (положите их рядом с index.html).
               Сейчас 2 штуки; чтобы добавить ещё — просто допишите имя файла.
     EMPTY_FRAMES — сколько пустых рамок с надписью показывать.
     PLACEHOLDER  — текст в пустых рамках.
     ====================================================== */
  const PHOTOS = [
    { src: "photo1.jpg", cap: "моя любимая ❤️",
      story: "ты пришла на один из важных моментов в моей жизни. я безумно рад, что ты у меня есть." },
    { src: "photo2.jpg", cap: "с тобой тепло ✦",
      story: "это наша первая совместная фотография, где мы вдвоём — и последней она не будет." }
  ];
  const EMPTY_CAPTIONS = [
    "будем пополнять коллекцию, Звёздочка ❤️",
    "здесь будет наше фото ✦",
    "оставлено для тёплого дня ♥",
    "скоро тут появишься ты 🌸",
    "местечко для улыбки твоей 💫"
  ];
  const EMPTY_FRAMES = 4;

  // Оформление «мило и по-разному»: скотч, иконки заглушек, цвета подписей
  const TAPES = [
    "rgba(255,214,120,0.6)",   // золото
    "rgba(255,150,185,0.55)",  // розовый
    "rgba(180,160,255,0.5)",   // сиреневый
    "rgba(150,220,210,0.5)"    // мятный
  ];
  const EMPTY_ICONS = ["✦", "❤", "🌸", "📷", "💫"];
  const CAP_COLORS  = ["#8a2f52", "#a13a63", "#7a3a86", "#b0466b"];

  // Раскрытие воспоминания
  const memView  = document.getElementById('memView');
  const memImg   = document.getElementById('memImg');
  const memStory = document.getElementById('memStory');
  const memReduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let memTimer = null, memFull = '';

  function memClearSparks() {
    memView.querySelectorAll('.mem-spark').forEach(s => s.remove());
  }
  function memSparkles(n) {
    memClearSparks();
    if (memReduce) return;
    const hues = ['#ffffff', '#ffd86b', '#ff9ec0'];
    for (let i = 0; i < n; i++) {
      const s = document.createElement('div');
      s.className = 'mem-spark';
      s.style.left = (8 + Math.random() * 84) + '%';
      s.style.top  = (12 + Math.random() * 74) + '%';
      s.style.background = hues[(Math.random() * hues.length) | 0];
      s.style.animationDelay = (Math.random() * 0.8).toFixed(2) + 's';
      memView.appendChild(s);
      setTimeout(() => s.remove(), 2700);
    }
  }

  function memFinishText() {
    if (memTimer) { clearInterval(memTimer); memTimer = null; }
    memStory.textContent = memFull;
  }
  function memType(text) {
    if (memTimer) { clearInterval(memTimer); memTimer = null; }
    memFull = text;
    if (memReduce) { memStory.textContent = text; return; }
    memStory.textContent = '';
    const caret = document.createElement('span');
    caret.className = 'caret';
    memStory.appendChild(caret);
    let i = 0;
    memTimer = setInterval(() => {
      i++;
      memStory.textContent = text.slice(0, i);
      if (i < text.length) { memStory.appendChild(caret); }
      else { clearInterval(memTimer); memTimer = null; }
    }, 34);
  }

  function openMem(src, story) {
    memImg.src = src;
    memView.classList.add('show');
    memSparkles(12);
    memType(story);
  }
  function closeMem() {
    if (memTimer) { clearInterval(memTimer); memTimer = null; }
    memClearSparks();
    memView.classList.remove('show');
  }
  // тап: пока печатается — показать текст сразу; иначе — закрыть
  memView.addEventListener('click', () => {
    if (memTimer) memFinishText();
    else closeMem();
  });

  function spawnFrames() {
    const items = [];
    PHOTOS.forEach(p => items.push({ type: 'photo', src: p.src, cap: p.cap, story: p.story }));
    for (let i = 0; i < EMPTY_FRAMES; i++) {
      items.push({ type: 'empty', cap: EMPTY_CAPTIONS[i % EMPTY_CAPTIONS.length], icon: EMPTY_ICONS[i % EMPTY_ICONS.length] });
    }
    // перемешиваем, чтобы фото и пустые рамки чередовались
    for (let i = items.length - 1; i > 0; i--) {
      const j = Math.random() * (i + 1) | 0;
      [items[i], items[j]] = [items[j], items[i]];
    }

    const n = items.length;
    const colW = 88 / n; // равномерно разносим по ширине

    items.forEach((it, idx) => {
      const f = document.createElement('div');
      f.className = 'photo-frame';

      const size = 108 + Math.random() * 40;             // сторона кадра, px
      const rot  = (Math.random() * 14 - 7).toFixed(1);  // наклон полароида
      f.style.setProperty('--r', rot + 'deg');
      f.style.setProperty('--o', (0.85 + Math.random() * 0.12).toFixed(2));
      f.style.setProperty('--cap', CAP_COLORS[(Math.random() * CAP_COLORS.length) | 0]);
      f.style.left = (5 + (idx + Math.random() * 0.6) * colW) + 'vw';

      const dur = 18 + Math.random() * 9;                // медленный полёт
      f.style.animationDuration = dur + 's';
      f.style.animationDelay = (-Math.random() * dur) + 's'; // сразу разбросаны по экрану

      // Скотч сверху — свой цвет и наклон
      const tape = TAPES[(Math.random() * TAPES.length) | 0];
      const tr = (Math.random() * 12 - 6).toFixed(1);

      const dim = `width:${size}px;height:${size}px`;
      if (it.type === 'photo') {
        f.classList.add('mem');   // делает рамку кликабельной
        f.innerHTML =
          `<div class="pf-tape" style="--tape:${tape};--tr:${tr}deg"></div>` +
          `<div class="pf-inner" style="${dim}"><img src="${it.src}" alt=""></div>` +
          `<div class="pf-cap">${it.cap}</div>`;
        // если фото не загрузилось — показываем милую заглушку вместо «битого» значка
        const img = f.querySelector('img');
        img.addEventListener('error', () => {
          const box = f.querySelector('.pf-inner');
          box.classList.add('pf-empty-photo');
          box.textContent = '🌸';
        });
        // тап по полароиду — раскрыть воспоминание
        if (it.story) f.addEventListener('click', () => openMem(it.src, it.story));
      } else {
        f.innerHTML =
          `<div class="pf-tape" style="--tape:${tape};--tr:${tr}deg"></div>` +
          `<div class="pf-inner pf-empty-photo" style="${dim}">${it.icon}</div>` +
          `<div class="pf-cap empty">${it.cap}</div>`;
      }
      scene.appendChild(f);
    });
  }

  spawnSparkles();
  spawnParticles();
  spawnFrames();

  // === Запуск по нажатию: музыка + анимации синхронно ===
  const dbg = document.getElementById('dbg');
  const bgm = document.getElementById('bgm');

  bgm.addEventListener('error', () => {
    const codes = {1:'ABORTED', 2:'NETWORK (файл не загрузился)', 3:'DECODE (формат не поддержан)', 4:'SRC_NOT_SUPPORTED (файл не найден или не mp3)'};
    const c = bgm.error ? bgm.error.code : 0;
    dbg.textContent = 'Ошибка аудио: ' + (codes[c] || c);
  });

  let started = false;
  function start() {
    if (started) return;
    started = true;

    dbg.textContent = 'запуск…';

    // Принудительно перезагружаем источник и пробуем играть
    bgm.volume = 1.0;
    bgm.muted = false;
    try { bgm.load(); } catch (e) {}

    const p = bgm.play();
    if (p && p.then) {
      p.then(() => {
        dbg.textContent = '♪ играет';
      }).catch((err) => {
        // Звук не пошёл — показываем причину и оставляем кнопку
        started = false;
        dbg.textContent = 'Не запустилось: ' + (err && err.name ? err.name : err) +
          '. Нажмите ещё раз.';
      });
    }

    // Снимаем паузу со всех анимаций сцены
    scene.classList.add('started');

    // Прячем экран запуска только после успешного старта звука
    if (p && p.then) {
      p.then(() => {
        document.getElementById('startOverlay').classList.add('hide');
      });
    } else {
      document.getElementById('startOverlay').classList.add('hide');
    }

    // Прорисовка сердца после появления текста
    setTimeout(() => { scene.classList.add('draw'); }, textDone);
    // Биение после прорисовки + заливки
    setTimeout(() => { scene.classList.add('beat'); }, textDone + 4600);
    // Дополнительная волна сердечек
    setTimeout(spawnParticles, textDone + 1000);
    // Появление нижних кнопок
    setTimeout(() => {
      document.getElementById('playBtn').classList.add('show');
      document.getElementById('missBtn').classList.add('show');
      renderTally();
    }, textDone + 5200);
  }

  document.getElementById('startOverlay').addEventListener('click', start);
  document.getElementById('startOverlay').addEventListener('touchend', start, { passive: true });


  /* ====================== СЧЁТЧИК «СОСКУЧИЛАСЬ» ======================
     Считает нажатия на этом устройстве/в этом браузере и хранит их,
     чтобы число не сбрасывалось между визитами.
     =================================================================== */
  const MISS_KEY = 'missCount_v1';
  const missBtn = document.getElementById('missBtn');
  const missTally = document.getElementById('missTally');

  function getMiss() {
    try { return parseInt(localStorage.getItem(MISS_KEY) || '0', 10) || 0; }
    catch (e) { return 0; }
  }
  function setMiss(n) {
    try { localStorage.setItem(MISS_KEY, String(n)); } catch (e) {}
  }
  function plural(n) {
    const a = n % 100, b = n % 10;
    if (a > 10 && a < 20) return 'раз';
    if (b === 1) return 'раз';
    if (b >= 2 && b <= 4) return 'раза';
    return 'раз';
  }
  function renderTally() {
    const n = getMiss();
    if (n <= 0) { missTally.classList.remove('show'); missTally.innerHTML = ''; return; }
    const cap = 20;
    const hearts = '❤️'.repeat(Math.min(n, cap)) + (n > cap ? ' …' : '');
    missTally.innerHTML =
      '<span class="mt-hearts">' + hearts + '</span>' +
      '<span class="mt-num">ты скучала ' + n + ' ' + plural(n) + '</span>';
    missTally.classList.add('show');
  }

  function floatMissHeart() {
    const r = missBtn.getBoundingClientRect();
    const h = document.createElement('div');
    h.className = 'miss-float';
    h.textContent = '❤️';
    h.style.left = (r.left + r.width / 2) + 'px';
    h.style.top  = (r.top) + 'px';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 1500);
  }

  // Нажатие: считаем, обновляем сердечки, вылетает сердечко.
  // Переход по tel: происходит сам (preventDefault не вызываем).
  missBtn.addEventListener('click', () => {
    setMiss(getMiss() + 1);
    renderTally();
    floatMissHeart();
  });


  /* ====================== МИНИ-ИГРА «СОБЕРИ ПАРЫ» ======================
     ВАШИ СЛОВА — меняйте только этот блок.
     sym  — картинка пары, note — что она увидит, когда найдёт пару.
     Можно добавить/убрать пары — всё пересчитается само (удобнее всего 6).
     ===================================================================== */
  const NOTES = [
    { sym: "🌙", note: "С тобой даже ночь становится теплее." },
    { sym: "⭐", note: "Ты — самая яркая звёздочка." },
    { sym: "🌸", note: "Скучаю по тебе, честно." },
    { sym: "🦋", note: "Рядом с тобой всё внутри замирает." },
    { sym: "🍓", note: "Ты ужасно милая, ты в курсе?" },
    { sym: "💫", note: "Ты мне очень-очень нравишься." }
  ];
  const WIN_TEXT = "Ты собрала все звёздочки ✦ Не грусти — ты особенная, Звёздочка.";
  const DREAM_TEXT = "мечтаю, чтобы ты сказала, что любишь меня";
  const MAX_MISTAKES = 6; // кнопка мечты появится, если ошибок меньше этого числа
  /* ===================== дальше менять не нужно ======================== */

  const gboard = document.getElementById('gboard');
  const gprog = document.getElementById('gprogress');
  const gnote = document.getElementById('gnote');
  const gnoteSym = document.getElementById('gnoteSym');
  const gnoteText = document.getElementById('gnoteText');
  const gwin = document.getElementById('gwin');
  const gwinText = document.getElementById('gwinText');
  const gDream = document.getElementById('gDream');
  const gDreamText = document.getElementById('gDreamText');

  let gfirst = null, glock = false, gfound = 0, gbuilt = false, gmistakes = 0;

  function gshuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

  function gskyInit(){
    const s = document.getElementById('gsky'); let h='';
    for(let i=0;i<36;i++){ h += `<span style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3.5}s"></span>`; }
    s.innerHTML = h;
  }

  function buildGame(){
    gskyInit();
    gboard.innerHTML=''; gprog.innerHTML=''; gfound=0; gfirst=null; glock=false; gmistakes=0;
    gDream.style.display='none'; gDreamText.classList.remove('show'); gDreamText.textContent='';
    const deck = gshuffle(NOTES.flatMap((p,i)=>[{...p,id:i},{...p,id:i}]));
    NOTES.forEach(()=>gprog.insertAdjacentHTML('beforeend','<i></i>'));
    deck.forEach((c)=>{
      const b = document.createElement('button');
      b.className='g-card'; b.dataset.id=c.id; b.setAttribute('aria-label','Карточка');
      b.innerHTML = `<div class="g-card-inner"><div class="g-face g-back"></div><div class="g-face g-front">${c.sym}</div></div>`;
      b.addEventListener('click',()=>gflip(b,c));
      gboard.appendChild(b);
    });
  }

  function gflip(b,c){
    if(glock || b.classList.contains('flipped') || b.classList.contains('matched')) return;
    b.classList.add('flipped');
    if(!gfirst){ gfirst={b,c}; return; }
    if(gfirst.b===b) return;
    glock=true;
    if(gfirst.c.id===c.id){
      gfirst.b.classList.add('matched'); b.classList.add('matched');
      gprog.children[c.id].classList.add('on'); gfound++;
      setTimeout(()=>gshowNote(c),420);
      gfirst=null; glock=false;
    } else {
      gmistakes++;
      setTimeout(()=>{ gfirst.b.classList.remove('flipped'); b.classList.remove('flipped'); gfirst=null; glock=false; },820);
    }
  }

  function gshowNote(c){ gnoteSym.textContent=c.sym; gnoteText.textContent=c.note; gnote.classList.add('show'); }

  gnote.addEventListener('click',()=>{
    gnote.classList.remove('show');
    if(gfound===NOTES.length) setTimeout(gwinShow,250);
  });

  function gwinShow(){
    gwinText.textContent=WIN_TEXT;
    gDreamText.classList.remove('show'); gDreamText.textContent='';
    gDream.style.display = (gmistakes < MAX_MISTAKES) ? 'block' : 'none';
    gwin.classList.add('show'); grain();
  }

  gDream.addEventListener('click',()=>{
    gDreamText.textContent = DREAM_TEXT;
    gDreamText.classList.add('show');
    gDream.style.display='none';
    grain();
  });

  function grain(){
    const set=['💖','✦','💫','🌟','💕'];
    for(let i=0;i<24;i++){
      const h=document.createElement('div');
      h.className='g-heart'; h.textContent=set[i%set.length];
      h.style.left=Math.random()*100+'vw';
      h.style.animationDuration=(3+Math.random()*3)+'s';
      h.style.animationDelay=(Math.random()*1.4)+'s';
      h.style.fontSize=(18+Math.random()*22)+'px';
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),7000);
    }
  }

  document.getElementById('gAgain').addEventListener('click',()=>{ gwin.classList.remove('show'); buildGame(); });

  document.getElementById('playBtn').addEventListener('click',()=>{
    if(!gbuilt){ buildGame(); gbuilt=true; }
    document.getElementById('game').classList.add('show');
  });
  document.getElementById('gBack').addEventListener('click',()=>{ document.getElementById('game').classList.remove('show'); });

  let gmuted=false;
  document.getElementById('gMute').addEventListener('click',()=>{
    gmuted=!gmuted; bgm.muted=gmuted;
    document.getElementById('gMute').textContent = gmuted ? '♪ без звука' : '♪ музыка';
  });
</script>
</body>
</html>
